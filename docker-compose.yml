version: '3.8'

services:
  cleanhabit:
    build: .
    container_name: cleanhabit
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /mnt/ssd/cleanhabit/data:/app/data
      - /mnt/ssd/cleanhabit/static:/app/static_ext
    environment:
      - TZ=Europe/Warsaw
      - DATABASE_PATH=/app/data/cleanhabit.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
